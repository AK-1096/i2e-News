<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Archive — NewsPulse AI</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <a class="back" href="index.html">&larr; Back to latest</a>
  <h1>Archive</h1>
  <p class="tagline">Every article published to NewsPulse AI.</p>
  <main id="list">Loading archive&hellip;</main>

  <script src="assets/app.js"></script>
  <script>
    loadArticles()
      .then(function (articles) {
        var list = document.getElementById('list');
        if (articles.length === 0) {
          list.innerHTML = '<p class="empty">No articles published yet.</p>';
          return;
        }
        // FR-S4: the archive shows the complete published history, newest-first.
        list.innerHTML = articles.map(renderListItem).join('');
      })
      .catch(function (err) {
        document.getElementById('list').innerHTML =
          '<p class="error">Could not load archive: ' + escapeHtml(err.message) + '</p>';
      });
  </script>
</body>
</html>
