<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Events — ALerts</title>
  <link rel="stylesheet" href="assets/styles.css?v=2">
</head>
<body>
  <header class="masthead">
    <nav class="masthead__inner" aria-label="Primary">
      <span class="masthead__spacer" aria-hidden="true"></span>
      <a class="wordmark" href="index.html" aria-label="ALerts — home">AI<span class="wordmark__foot" aria-hidden="true"></span>ERTS</a>
      <span class="masthead__nav">
        <a class="ghost-link" href="archive.html">Archive &rarr;</a>
      </span>
    </nav>
  </header>

  <main class="frontpage">
    <section class="hero">
      <h1 class="headline">Events</h1>
      <p class="caption" id="dateline">Curated AI news, newest first</p>
    </section>

    <div id="role-filter"></div>

    <div id="list">
      <p class="state-loading">Setting the page&hellip;</p>
    </div>

    <footer class="frontpage__footer">
      <a class="pill" href="index.html">Back to the front page &rarr;</a>
      <p class="frontpage__note">
        Curated by i2e Consulting AI Labs — summaries by the ALerts curator agent.
      </p>
    </footer>
  </main>

  <script src="assets/app.js?v=2"></script>
  <script>
    loadArticles()
      .then(function (articles) {
        var list = document.getElementById('list');
        var dateline = document.getElementById('dateline');

        if (articles.length === 0) {
          list.innerHTML =
            '<h2 class="state-card__title">Nothing has been filed yet.</h2>' +
            '<p class="state-card__body">The curator hasn&rsquo;t published any events. Check back once the next edition goes out.</p>';
          return;
        }

        if (dateline) {
          dateline.innerHTML =
            'Curated AI news, newest first &middot; ' + articles.length + ' events';
        }

        function render(role) {
          var filtered = filterByRole(articles, role);
          if (filtered.length === 0) {
            list.innerHTML =
              '<h2 class="state-card__title">Nothing filed for this role yet.</h2>' +
              '<p class="state-card__body">No events match that role right now. Try another role, or pick &ldquo;Everyone&rdquo; to see them all.</p>';
            return;
          }
          list.innerHTML = '<div class="contents">' + filtered.map(renderListItem).join('') + '</div>';
        }

        renderRoleFilter(document.getElementById('role-filter'), render);
        render(null);
      })
      .catch(function (err) {
        document.getElementById('list').innerHTML =
          '<div class="card">' +
            '<h2 class="state-card__title">The events couldn&rsquo;t be loaded.</h2>' +
            '<p class="state-card__body">Could not load articles: ' + escapeHtml(err.message) + '. Try again in a moment.</p>' +
            '<a class="ghost-link" href="index.html">Back to the front page &rarr;</a>' +
          '</div>';
      });

    // Dynamic header: retract the masthead on scroll-down, pin the compact
    // "Events" bar top-left, restore the masthead on scroll-up.
    initDynamicHeader({
      title: 'Events',
      sub: 'Curated AI news',
      collapseAfter: document.querySelector('.hero')
    });
  </script>
</body>
</html>
