<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Guide — ALerts</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <header class="masthead">
    <nav class="masthead__inner" aria-label="Primary">
      <span class="masthead__spacer" aria-hidden="true"></span>
      <a class="wordmark" href="index.html" aria-label="ALerts — home">AI<span class="wordmark__foot" aria-hidden="true"></span>ERTS</a>
      <span class="masthead__nav">
        <a class="ghost-link" href="archive.html">Archive &rarr;</a>
      </span>
    </nav>
  </header>

  <main class="reading">
    <div id="usecase">
      <p class="state-loading">Setting the page&hellip;</p>
    </div>
  </main>

  <script src="assets/app.js"></script>
  <script>
    function getId() {
      return new URLSearchParams(window.location.search).get('id');
    }

    // Bordered-card state (no id / not found / fetch error), inside the column.
    function stateCard(title, body) {
      return '<div class="card">' +
        '<h2 class="state-card__title">' + title + '</h2>' +
        '<p class="state-card__body">' + body + '</p>' +
        '<a class="ghost-link" href="playbook.html">Back to the AI Guide &rarr;</a>' +
        '</div>';
    }

    // A labelled field block (caption label + body paragraph).
    function field(label, body) {
      return '<div class="field">' +
        '<p class="field__label caption">' + label + '</p>' +
        '<p class="field__body">' + escapeHtml(body) + '</p>' +
        '</div>';
    }

    var container = document.getElementById('usecase');
    var id = getId();

    if (!id) {
      container.innerHTML = stateCard(
        'This entry isn&rsquo;t in the AI Guide.',
        'No use-case was specified in the link. Head back to the AI Guide to browse what the curator has filed.'
      );
    } else {
      loadUsecases()
        .then(function (usecases) {
          var u = usecases.filter(function (x) { return x.id === id; })[0];
          if (!u) {
            container.innerHTML = stateCard(
              'This entry isn&rsquo;t in the AI Guide.',
              'We couldn&rsquo;t find a use-case matching that link. It may have been removed, or the link may be out of date.'
            );
            return;
          }
          document.title = u.title + ' — ALerts AI Guide';

          var tools = (Array.isArray(u.tools) ? u.tools : []).map(function (t) {
            return '<li class="tool-chip">' + escapeHtml(t) + '</li>';
          }).join('');

          // Meta line: author (if any) · platform · original date.
          var meta = '';
          if (u.author) meta += escapeHtml(u.author) + ' &middot; ';
          meta += escapeHtml(platformLabel(u.sourcePlatform)) + ' &middot; ' + formatDate(u.publishedDate);

          var html =
            '<article class="clipping">' +
              '<p class="clipping__chip"><span class="chip">' + escapeHtml(u.category) + '</span></p>' +
              '<h1 class="headline">' + escapeHtml(u.title) + '</h1>' +
              '<p class="dateline caption">' + meta + '</p>' +
              '<aside class="disclaimer" role="note" aria-label="Important notice">' +
                '<p class="disclaimer__kicker">Read this first</p>' +
                '<p class="disclaimer__lead">' +
                  '<strong>Community-sourced technique.</strong> Gathered from a public internet source. ' +
                  'Verify results, follow i2e&rsquo;s data-handling policies, and never enter confidential, ' +
                  'client, or personal data into tools not approved by IT.' +
                '</p>' +
                '<ul class="disclaimer__points">' +
                  '<li>This content is shared for knowledge purposes only.</li>' +
                  '<li>It is based on general industry practices, not on any specific project or client.</li>' +
                  '<li>It is <strong>not</strong> official i2e IT guidance.</li>' +
                  '<li>For official guidance, contact the IT team before acting on anything here.</li>' +
                '</ul>' +
              '</aside>' +
              '<div class="field">' +
                '<p class="field__label caption">Applies to</p>' +
                '<ul class="tool-chips">' + tools + '</ul>' +
              '</div>' +
              field('What it does', u.whatItDoes) +
              field('What it improves', u.whatItImproves) +
              field('How to try it', u.howToTry) +
              (u.difficulty ? field('Difficulty', u.difficulty) : '') +
              renderRelevance(u.relevance) +
              '<p class="clipping__action">' +
                '<a class="btn-accent" href="' + escapeHtml(u.sourceUrl) + '" target="_blank" rel="noopener noreferrer">' +
                  'View the original source &rarr;</a>' +
              '</p>' +
              '<p class="clipping__secondary"><a class="ghost-link" href="playbook.html">Browse the AI Guide</a></p>' +
              '<footer class="clipping__footnote">' +
                'Curated by i2e Consulting AI Labs — techniques gathered by the ALerts curator agent.' +
              '</footer>' +
            '</article>';
          container.innerHTML = html;
        })
        .catch(function (err) {
          container.innerHTML = stateCard(
            'This entry couldn&rsquo;t be loaded.',
            'Something went wrong fetching the record: ' + escapeHtml(err.message) + '. Try again in a moment.'
          );
        });
    }
  </script>
</body>
</html>
