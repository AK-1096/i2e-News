<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ALerts</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <header class="masthead">
    <nav class="masthead__inner" aria-label="Primary">
      <a class="wordmark" href="index.html" aria-label="ALerts — home">AI<span class="wordmark__foot" aria-hidden="true"></span>ERTS</a>
      <span class="masthead__nav">
        <a class="ghost-link" href="playbook.html">Playbook</a>
        <a class="ghost-link" href="archive.html">Archive &rarr;</a>
      </span>
    </nav>
  </header>

  <main class="frontpage">
    <section class="hero">
      <h1 class="hero__display" aria-label="ALerts">AI<span class="wordmark__foot" aria-hidden="true"></span>ERTS</h1>
      <p class="hero__dateline caption" id="dateline">Curated AI News &middot; i2e Consulting AI Labs</p>
    </section>

    <div id="list" class="contents">
      <p class="state-loading">Setting the page&hellip;</p>
    </div>

    <footer class="frontpage__footer">
      <a class="pill" href="archive.html">Full archive &rarr;</a>
      <p class="frontpage__note">
        Curated by i2e Consulting AI Labs — summaries by the ALerts curator agent.
      </p>
    </footer>
  </main>

  <script src="assets/app.js"></script>
  <script>
    loadArticles()
      .then(function (articles) {
        var list = document.getElementById('list');
        var dateline = document.getElementById('dateline');

        if (articles.length === 0) {
          list.innerHTML =
            '<h2 class="state-card__title">Nothing has been filed yet.</h2>' +
            '<p class="state-card__body">The curator hasn&rsquo;t published any articles. Check back once the next edition goes out.</p>';
          return;
        }

        // Newest addedDate leads the dateline (articles are sorted newest-first).
        if (dateline) {
          dateline.innerHTML =
            'Curated AI News &middot; i2e Consulting AI Labs &middot; Updated ' + formatDate(articles[0].addedDate);
        }

        // FR-S7: front page shows only the most recent items; the rest are in the archive.
        list.innerHTML = articles.slice(0, RECENT_LIMIT).map(renderListItem).join('');
      })
      .catch(function (err) {
        document.getElementById('list').innerHTML =
          '<div class="card">' +
            '<h2 class="state-card__title">The page couldn&rsquo;t be loaded.</h2>' +
            '<p class="state-card__body">Could not load articles: ' + escapeHtml(err.message) + '. Try again in a moment.</p>' +
            '<a class="ghost-link" href="archive.html">Try the full archive &rarr;</a>' +
          '</div>';
      });
  </script>
</body>
</html>
