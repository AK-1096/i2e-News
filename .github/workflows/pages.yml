name: Validate data contract

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# NFR-3: keep data/articles.json schema-valid. On agent publishes the real gate is in
# publish.yml, which validates BEFORE commit so a bad write never reaches main. This workflow
# is a CI signal for human pushes to main. It intentionally does NOT deploy: deploying is
# handled solely by GitHub Pages' built-in "Deploy from a branch" builder. (It used to run
# actions/deploy-pages here, which raced with the branch builder and failed — see publish.yml.)
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate articles.json against schema
        run: npx --yes ajv-cli@5 validate -s data/articles.schema.json -d data/articles.json
