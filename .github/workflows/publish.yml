name: Publish article

# The curator agent (Copilot Studio) publishes an article by sending a repository_dispatch
# event with the 8 contract fields in client_payload. This workflow does the whole publish in
# one shot: upsert into data/articles.json, validate against the schema (NFR-3), commit, and
# deploy the static site — so publishing needs no expression-heavy logic on the agent side.

on:
  repository_dispatch:
    types: [publish-article]

permissions:
  contents: write
  pages: write
  id-token: write

# Share the 'pages' concurrency group with the push-triggered deploy so the two never overlap.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Upsert article into the data contract
        env:
          ART_ID: ${{ github.event.client_payload.id }}
          ART_TITLE: ${{ github.event.client_payload.title }}
          ART_URL: ${{ github.event.client_payload.url }}
          ART_SOURCE: ${{ github.event.client_payload.source }}
          ART_SUMMARY: ${{ github.event.client_payload.summary }}
          ART_TOPIC: ${{ github.event.client_payload.topic }}
          ART_PUBLISHED: ${{ github.event.client_payload.publishedDate }}
          ART_ADDED: ${{ github.event.client_payload.addedDate }}
        run: node scripts/upsert-article.mjs

      # Same gate as pages.yml: a bad write fails here, before commit/deploy, so the live
      # archive is never corrupted (NFR-3).
      - name: Validate articles.json against schema
        run: npx --yes ajv-cli@5 validate -s data/articles.schema.json -d data/articles.json

      - name: Commit the updated data contract
        run: |
          git config user.name "newspulse-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.json
          if git diff --cached --quiet; then
            echo "No change to data/articles.json (idempotent republish); skipping commit."
          else
            git commit -m "Publish: ${{ github.event.client_payload.title }}"
            git push
          fi

      # Deploy from this same workflow: a GITHUB_TOKEN commit does not re-trigger pages.yml,
      # so we build + deploy the freshly-updated site here.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
