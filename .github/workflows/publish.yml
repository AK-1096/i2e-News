name: Publish article

# The curator agent (Copilot Studio) publishes an article by sending a repository_dispatch
# event with the 8 contract fields in client_payload. This workflow upserts into
# data/articles.json, validates against the schema (NFR-3), commits, and pushes. The push then
# triggers GitHub Pages' built-in "Deploy from a branch" builder, which does the actual deploy —
# so we intentionally do NOT deploy here (that raced with the branch builder and caused
# "Deployment failed, try again later"). Publishing needs no expression-heavy agent-side logic.

on:
  repository_dispatch:
    types: [publish-article]

permissions:
  contents: write

# Serialise publish runs: two dispatches close together would otherwise both commit off the same
# base and the second push would fail non-fast-forward. Queue them (never cancel a pending publish).
concurrency:
  group: publish-article
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Upsert article into the data contract
        env:
          ART_ID: ${{ github.event.client_payload.id }}
          ART_TITLE: ${{ github.event.client_payload.title }}
          ART_URL: ${{ github.event.client_payload.url }}
          ART_SOURCE: ${{ github.event.client_payload.source }}
          ART_SUMMARY: ${{ github.event.client_payload.summary }}
          ART_TOPIC: ${{ github.event.client_payload.topic }}
          ART_PUBLISHED: ${{ github.event.client_payload.publishedDate }}
          ART_ADDED: ${{ github.event.client_payload.addedDate }}
        run: node scripts/upsert-article.mjs

      # Same gate as pages.yml: a bad write fails here, before commit/deploy, so the live
      # archive is never corrupted (NFR-3).
      - name: Validate articles.json against schema
        run: npx --yes ajv-cli@5 validate -s data/articles.schema.json -d data/articles.json

      - name: Commit the updated data contract
        run: |
          git config user.name "newspulse-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/articles.json
          if git diff --cached --quiet; then
            echo "No change to data/articles.json (idempotent republish); skipping commit."
          else
            git commit -m "Publish: ${{ github.event.client_payload.title }}"
            git push
          fi
      # No deploy step: the push above triggers the GitHub Pages branch builder, which deploys.
