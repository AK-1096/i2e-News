<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NewsPulse AI</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <a class="back" href="index.html">&larr; All articles</a>
  <main id="article" class="article-view">Loading article&hellip;</main>

  <script src="assets/app.js"></script>
  <script>
    function getId() {
      return new URLSearchParams(window.location.search).get('id');
    }

    var container = document.getElementById('article');
    var id = getId();

    if (!id) {
      container.innerHTML = '<p class="error">No article id specified.</p>';
    } else {
      loadArticles()
        .then(function (articles) {
          var a = articles.filter(function (x) { return x.id === id; })[0];
          if (!a) {
            container.innerHTML = '<p class="error">Article not found.</p>';
            return;
          }
          document.title = a.title + ' — NewsPulse AI';
          container.innerHTML =
            '<h1>' + escapeHtml(a.title) + '</h1>' +
            '<p class="meta">' + escapeHtml(a.source) + ' &middot; ' + formatDate(a.publishedDate) +
              ' &middot; Topic: ' + escapeHtml(a.topic) + '</p>' +
            '<p class="summary">' + escapeHtml(a.summary) + '</p>' +
            '<p class="source-link"><a href="' + escapeHtml(a.url) + '" target="_blank" rel="noopener noreferrer">Read the original at ' + escapeHtml(a.source) + ' &rarr;</a></p>';
        })
        .catch(function (err) {
          container.innerHTML = '<p class="error">Could not load article: ' + escapeHtml(err.message) + '</p>';
        });
    }
  </script>
</body>
</html>
